    <path d="M642 486c52 12 118 40 160 84" fill="none" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(648 360) scale(1.18)" filter="url(#glow)">
    <path d="M0-154 92 116 0 54-92 116Z" fill="url(#ship)"/>
    <path d="M0-112 42 62 0 26-42 62Z" fill="#0f172a" opacity="0.9"/>
    <path d="M-18-62H18V30H-18Z" fill="#22d3ee" opacity="0.95"/>
    <path d="M-42 124 0 226 42 124Z" fill="url(#engine)"/>
    <circle cx="0" cy="18" r="122" fill="none" stroke="#38bdf8" stroke-width="8" opacity="0.48"/>
  </g>

  <g transform="translate(316 244) rotate(-24)">
