<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Cosmic Vanguard cover</title>
  <desc id="desc">Original cover art for the Cosmic Vanguard arcade game.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="55%" stop-color="#0f1d46"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="nebulaA" cx="20%" cy="24%" r="48%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#1d4ed8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaB" cx="82%" cy="30%" r="36%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ship" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#nebulaA)"/>
  <rect width="1200" height="720" fill="url(#nebulaB)"/>

  <g fill="#ffffff" opacity="0.82">
    <circle cx="92" cy="108" r="2"/>
    <circle cx="214" cy="84" r="1.8"/>
    <circle cx="330" cy="168" r="1.4"/>
    <circle cx="488" cy="96" r="2.2"/>
    <circle cx="642" cy="132" r="1.8"/>
    <circle cx="860" cy="92" r="1.5"/>
    <circle cx="1098" cy="146" r="2.1"/>
    <circle cx="1018" cy="224" r="1.4"/>
    <circle cx="872" cy="196" r="1.6"/>
    <circle cx="176" cy="256" r="2.2"/>
    <circle cx="280" cy="328" r="1.3"/>
    <circle cx="114" cy="382" r="1.8"/>
    <circle cx="964" cy="412" r="2.1"/>
    <circle cx="1048" cy="502" r="1.5"/>
    <circle cx="898" cy="580" r="1.6"/>
    <circle cx="722" cy="620" r="1.4"/>
  </g>

  <g opacity="0.9">
