  </g>
  <g transform="translate(904 244) rotate(22)">
    <path d="M0-64 36 48 0 18-36 48Z" fill="#a78bfa"/>
    <path d="M-12-18H12V30H-12Z" fill="#ede9fe" opacity="0.9"/>
  </g>

  <g transform="translate(944 506)">
    <path d="M0-84 68 0 0 84-68 0Z" fill="#facc15" opacity="0.92"/>
    <circle cx="0" cy="0" r="26" fill="#0f172a"/>
  </g>

  <g fill="#cbd5e1" opacity="0.82">
    <path d="M150 470c18-22 54-32 84-20 30 14 44 44 34 72-12 34-54 50-92 34-32-14-42-54-26-86Z"/>
