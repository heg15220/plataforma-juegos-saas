    <text x="34" y="134" fill="#7dd3fc" font-family="Bricolage Grotesque, Arial, sans-serif" font-size="66" font-weight="800">VANGUARD</text>
    <text x="36" y="164" fill="#cbd5e1" font-family="Outfit, Arial, sans-serif" font-size="22">Arcade sector assault with adaptive fleets and leaderboard ops</text>
  </g>
</svg>
